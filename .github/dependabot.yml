version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"

  # Security-only updates: Dependabot opens PRs only for vulnerability fixes
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      security-updates: true
    open-pull-requests-limit: 10
    labels:
      - "security"
